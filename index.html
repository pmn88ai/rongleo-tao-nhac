<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🎵 AI Music Studio</title>
  <style>
    /* ==============================
       RESET & BIẾN CSS
    ============================== */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #ede9fe;
      --bg2: #f5f3ff;
      --card: #ffffff;
      --primary: #7c3aed;
      --primary-lt: #ede9fe;
      --primary-dk: #5b21b6;
      --green: #059669;
      --green-lt: #d1fae5;
      --green-dk: #047857;
      --amber: #d97706;
      --amber-lt: #fef3c7;
      --text: #1e1b4b;
      --text-sm: #6b7280;
      --border: #ddd6fe;
      --shadow: rgba(124, 58, 237, .12);
      --radius: 16px;
      --radius-sm: 10px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      font-size: 17px;
      background: linear-gradient(160deg, var(--bg) 0%, var(--bg2) 100%);
      min-height: 100vh;
      color: var(--text);
    }

    /* ==============================
       HEADER
    ============================== */
    header {
      background: linear-gradient(135deg, #7c3aed 0%, #4f46e5 100%);
      color: #fff;
      padding: 28px 20px 24px;
      text-align: center;
    }

    header h1 {
      font-size: 2.1rem;
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    header p {
      font-size: 1.05rem;
      opacity: .85;
      margin-top: 6px;
    }

    /* ==============================
       LAYOUT
    ============================== */
    .container {
      max-width: 680px;
      margin: 0 auto;
      padding: 22px 16px 60px;
    }

    /* ==============================
       CARD
    ============================== */
    .card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 24px 22px;
      margin-bottom: 20px;
      box-shadow: 0 4px 24px var(--shadow);
    }

    .card-title {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* ==============================
       FORM ELEMENTS
    ============================== */
    label {
      display: block;
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 8px;
    }

    textarea,
    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 13px 14px;
      border: 2px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 1rem;
      font-family: inherit;
      color: var(--text);
      background: #faf9ff;
      resize: vertical;
      transition: border-color .2s, box-shadow .2s;
    }

    textarea:focus,
    input:focus {
      outline: none;
      border-color: var(--primary);
      background: #fff;
      box-shadow: 0 0 0 3px rgba(124, 58, 237, .12);
    }

    textarea {
      min-height: 90px;
    }

    /* ==============================
       BUTTONS
    ============================== */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px 20px;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 1.05rem;
      font-weight: 700;
      cursor: pointer;
      transition: background .18s, transform .1s, box-shadow .18s;
      width: 100%;
      min-height: 52px;
    }

    .btn:active {
      transform: scale(.97);
    }

    .btn:disabled {
      opacity: .55;
      cursor: not-allowed;
    }

    .btn-primary {
      background: var(--primary);
      color: #fff;
      margin-top: 14px;
    }

    .btn-primary:hover:not(:disabled) {
      background: var(--primary-dk);
    }

    .btn-soft {
      background: var(--primary-lt);
      color: var(--primary);
      margin-top: 0;
    }

    .btn-soft:hover:not(:disabled) {
      background: #ddd6fe;
    }

    .btn-outline {
      background: #fff;
      color: var(--primary);
      border: 2px solid var(--primary);
      margin-top: 0;
    }

    .btn-outline:hover:not(:disabled) {
      background: var(--primary-lt);
    }

    .btn-sm {
      padding: 10px 16px;
      font-size: .95rem;
      min-height: 42px;
      width: auto;
      margin-top: 10px;
    }

    /* Nút 2 cột */
    .btn-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 14px;
    }

    /* ==============================
       LOADING SPINNER
    ============================== */
    .loading {
      display: none;
      align-items: center;
      gap: 10px;
      padding: 14px 0 4px;
      color: var(--primary);
      font-size: 1rem;
      font-weight: 600;
    }

    .loading.active {
      display: flex;
    }

    .spinner {
      width: 22px;
      height: 22px;
      border: 3px solid var(--primary-lt);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin .75s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* ==============================
       CHORDS TOGGLE
    ============================== */
    .toggle-row {
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      user-select: none;
    }

    .toggle-row input[type="checkbox"] {
      width: 22px;
      height: 22px;
      cursor: pointer;
      accent-color: var(--primary);
    }

    .toggle-row span {
      font-size: 1.05rem;
      font-weight: 600;
    }

    /* ==============================
       SEARCH
    ============================== */
    .search-input {
      width: 100%;
      padding: 11px 14px;
      border: 2px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 1rem;
      font-family: inherit;
      color: var(--text);
      background: #faf9ff;
      margin-bottom: 14px;
      transition: border-color .2s;
    }

    .search-input:focus {
      outline: none;
      border-color: var(--primary);
      background: #fff;
    }

    /* ==============================
       TOAST
    ============================== */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(120px);
      background: #1e1b4b;
      color: #fff;
      padding: 13px 26px;
      border-radius: 50px;
      font-size: 1rem;
      font-weight: 600;
      z-index: 9999;
      transition: transform .3s cubic-bezier(.34, 1.56, .64, 1);
      white-space: nowrap;
      max-width: 90vw;
      text-align: center;
      pointer-events: none;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
    }

    /* ==============================
       ACTION BUTTONS ROW (copy / save / export)
    ============================== */
    .btn-action-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
    }

    .btn-action {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 10px 14px;
      border-radius: var(--radius-sm);
      font-size: .95rem;
      font-weight: 600;
      cursor: pointer;
      border: 2px solid transparent;
      transition: background .15s, transform .1s;
      flex: 1;
      min-width: 130px;
      min-height: 44px;
    }

    .btn-action:active {
      transform: scale(.97);
    }

    .btn-action-outline {
      background: #fff;
      color: var(--primary);
      border-color: var(--primary);
    }

    .btn-action-outline:hover {
      background: var(--primary-lt);
    }

    .btn-action-green {
      background: var(--green-lt);
      color: var(--green-dk);
      border-color: var(--green);
    }

    .btn-action-green:hover {
      background: #a7f3d0;
    }

    /* ==============================
       LỊCH SỬ BÀI HÁT
    ============================== */
    .history-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 4px;
    }

    .history-item {
      background: #faf9ff;
      border: 2px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 13px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .history-item-info {
      flex: 1;
      min-width: 0;
    }

    .history-item-title {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .history-item-date {
      font-size: .8rem;
      color: var(--text-sm);
      margin-top: 2px;
    }

    .history-item-btns {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }

    .btn-history {
      padding: 8px 12px;
      border-radius: 8px;
      font-size: .85rem;
      font-weight: 700;
      cursor: pointer;
      border: none;
      transition: background .15s;
      white-space: nowrap;
    }

    .btn-history-load {
      background: var(--primary-lt);
      color: var(--primary);
    }

    .btn-history-load:hover {
      background: #ddd6fe;
    }

    .btn-history-del {
      background: #fee2e2;
      color: #dc2626;
    }

    .btn-history-del:hover {
      background: #fecaca;
    }

    .history-empty {
      text-align: center;
      color: var(--text-sm);
      padding: 20px 0;
      font-size: .95rem;
    }

    .empty-state {
      text-align: center;
      color: #9ca3af;
      padding: 12px;
      font-size: 0.9rem;
    }

    .history-item.active {
      border-color: var(--primary);
      background: var(--primary-lt);
    }

    .badge-editing {
      display: inline-block;
      font-size: .75rem;
      font-weight: 700;
      color: var(--primary);
      background: #fff;
      border: 1.5px solid var(--primary);
      border-radius: 20px;
      padding: 1px 8px;
      margin-left: 6px;
      vertical-align: middle;
    }

    .preview {
      font-size: .88rem;
      color: var(--text-sm);
      margin-top: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ==============================
       RESPONSIVE
    ============================== */
    @media (max-width: 500px) {
      header h1 {
        font-size: 1.65rem;
      }

      .music-cards {
        grid-template-columns: 1fr;
      }

      .btn-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

  <header>
    <h1>🎵 AI Music Studio</h1>
    <p>Sáng tác bài hát của bạn cùng trí tuệ nhân tạo</p>
  </header>

  <!-- Toast thông báo -->
  <div class="toast" id="toast"></div>

  <div class="container">

    <!-- ============================
       Ý TƯỞNG
  ============================= -->
    <div class="card">
      <div class="card-title">💡 Ý Tưởng Bài Hát</div>
      <label for="ideaInput">Mô tả ý tưởng bài hát của bạn:</label>
      <textarea id="ideaInput" rows="4"
        placeholder="Ví dụ: Bài hát về quê hương, nỗi nhớ tuổi thơ, dòng sông xanh và cánh đồng lúa chín vàng..."></textarea>

      <label for="audience" style="margin-top:14px;">🎯 Đối tượng nghe:</label>
      <select id="audience"
        style="width:100%;padding:13px 14px;border:2px solid var(--border);border-radius:var(--radius-sm);font-size:1rem;font-family:inherit;color:var(--text);background:#faf9ff;appearance:auto;">
        <option value="">— Chọn đối tượng nghe —</option>
        <option value="general">🌐 Mọi người</option>
        <option value="kids">🧒 Thiếu nhi</option>
        <option value="genz">🎧 Thanh thiếu niên (Gen Z)</option>
        <option value="middle">👔 Trung niên</option>
        <option value="elder">🌸 Người lớn tuổi</option>
      </select>

      <div class="loading" id="lyricsLoading">
        <span class="spinner"></span> Đang tạo lời bài hát, vui lòng chờ...
      </div>
      <button class="btn btn-primary" id="btnGenLyrics" onclick="generateLyrics()">
        📝 Tạo Lời Bài Hát
      </button>
    </div>

    <!-- ============================
       LỜI BÀI HÁT
  ============================= -->
    <div class="card">
      <div class="card-title">📜 Lời Bài Hát</div>

      <!-- Tựa bài hát — tự điền khi AI tạo lời, có thể sửa tay -->
      <label for="songTitle">🎤 Tựa bài hát:</label>
      <input type="text" id="songTitle" placeholder="Tên bài hát sẽ tự điền sau khi tạo lời..."
        style="margin-bottom:16px;" />

      <label for="lyricsOutput">Lời bài hát (có thể chỉnh sửa tự do):</label>
      <textarea id="lyricsOutput" rows="11"
        placeholder="Lời bài hát sẽ hiện ở đây sau khi bạn bấm 'Tạo Lời Bài Hát' ở trên..."></textarea>

      <div class="btn-row">
        <button class="btn btn-soft" id="btnRewrite" onclick="rewriteLyrics()">
          🔄 Viết Lại Lời
        </button>
        <button class="btn btn-outline" onclick="copyLyrics()">
          📋 Copy Lời
        </button>
      </div>
      <!-- Viết tiếp từ đoạn cuối -->
      <button class="btn btn-soft" id="btnContinue" onclick="continueLyrics()" style="margin-top:10px;">
        ✍️ Viết Tiếp Đoạn Này
      </button>
    </div>

    <!-- ============================
       GIAI ĐIỆU
  ============================= -->
    <div class="card">
      <div class="card-title">🎼 Giai Điệu & Phong Cách</div>
      <label for="styleInput">Mô tả phong cách nhạc mong muốn:</label>
      <input type="text" id="styleInput" placeholder="Ví dụ: bolero buồn nhẹ nhàng, tempo chậm 70 BPM, lãng mạn..." />
      <div class="loading" id="melodyLoading">
        <span class="spinner"></span> Đang gợi ý giai điệu...
      </div>
      <button class="btn btn-primary" id="btnGenMelody" onclick="generateMelody()">
        🎵 Gợi Ý Giai Điệu
      </button>
      <label for="melodyOutput" style="margin-top:18px;">Thông tin giai điệu (có thể chỉnh sửa):</label>
      <textarea id="melodyOutput" rows="6" placeholder="Thông tin giai điệu sẽ hiện ở đây..."></textarea>
      <div class="btn-action-row">
        <button class="btn-action btn-action-outline" onclick="copyMelody()">
          📋 Copy Giai Điệu
        </button>
      </div>
    </div>

    <!-- ============================
       HỢP ÂM
  ============================= -->
    <div class="card">
      <div class="card-title">🎸 Hợp Âm (Tuỳ Chọn)</div>
      <label class="toggle-row">
        <input type="checkbox" id="chordsToggle" onchange="toggleChords()" />
        <span>Thêm hợp âm vào bài hát</span>
      </label>

      <div id="chordsContent" style="display:none; margin-top:18px;">
        <div class="loading" id="chordsLoading">
          <span class="spinner"></span> Đang gợi ý hợp âm...
        </div>
        <button class="btn btn-primary" id="btnGenChords" onclick="generateChords()">
          🎸 Gợi Ý Hợp Âm
        </button>
        <label for="chordsOutput" style="margin-top:18px;">Hợp âm (có thể chỉnh sửa):</label>
        <textarea id="chordsOutput" rows="7"
          placeholder="Hợp âm sẽ hiện ở đây...&#10;&#10;Ví dụ:&#10;[Verse]&#10;Am - Dm - G - C&#10;&#10;[Chorus]&#10;F - G - Em - Am"></textarea>
        <div class="btn-action-row" style="margin-top:12px;">
          <button class="btn-action btn-action-outline" onclick="copyChords()">
            📋 Copy Hợp Âm
          </button>
        </div>
      </div>
    </div>

    <!-- ============================
         LƯU & QUẢN LÝ
    ============================= -->
    <div class="card">
      <div class="card-title">💾 Lưu & Quản Lý</div>
      <div class="btn-action-row">
        <button class="btn-action btn-action-green" onclick="saveSong(false)">
          💾 Lưu Bài Hát
        </button>
        <button class="btn-action btn-action-outline" onclick="exportJSON()">
          ⬇️ Xuất JSON
        </button>
        <label class="btn-action btn-action-outline" style="cursor:pointer;">
          ⬆️ Nhập JSON
          <input type="file" id="importFile" accept=".json" onchange="importJSON(event)" style="display:none;" />
        </label>
        <button class="btn-action" onclick="clearAll()" style="background:#fee2e2;color:#dc2626;border-color:#fca5a5;">
          🗑️ Xóa nội dung
        </button>
      </div>
    </div>

    <!-- ============================
         BÀI HÁT ĐÃ LƯU
    ============================= -->
    <div class="card">
      <div class="card-title">📚 Bài Hát Đã Lưu</div>
      <input type="text" id="searchHistory" class="search-input" placeholder="🔍 Tìm theo tên hoặc lời bài hát..." />
      <div id="historyList">
        <p class="history-empty">Chưa có bài hát nào được lưu.</p>
      </div>
    </div>

  </div><!-- /container -->

  <script>
    // ============================================================
    // DEBOUNCE & TRẠNG THÁI BÀI ĐANG CHỈNH
    // ============================================================
    function debounce(fn, delay) {
      let timer;
      return function (...args) {
        clearTimeout(timer);
        timer = setTimeout(() => fn.apply(this, args), delay);
      };
    }

    let currentSongId = null;
    // Auto-save lịch sử sau 2 giây không gõ (silent — không hiện toast)
    const autoSaveDebounced = debounce(() => saveSong(true), 2000);

    // ============================================================
    // KHỞI ĐỘNG — load dữ liệu đã lưu
    // ============================================================
    (function init() {
      const get = k => localStorage.getItem(k) || '';
      const set = (id, k) => { const v = get(k); if (v) document.getElementById(id).value = v; };
      set('ideaInput', 'music_idea');
      set('songTitle', 'music_title');
      set('lyricsOutput', 'music_lyrics');
      set('styleInput', 'music_style');
      set('melodyOutput', 'music_melody');
      set('chordsOutput', 'music_chords');

      const savedAudience = localStorage.getItem('music_audience');
      if (savedAudience) document.getElementById('audience').value = savedAudience;

      if (localStorage.getItem('chords_on') === '1') {
        document.getElementById('chordsToggle').checked = true;
        document.getElementById('chordsContent').style.display = 'block';
      }

      // Các field lưu localStorage + auto-save debounced vào history
      const contentFields = new Set(['ideaInput', 'songTitle', 'lyricsOutput', 'melodyOutput', 'chordsOutput']);
      const autoSave = [
        ['ideaInput', 'music_idea'],
        ['songTitle', 'music_title'],
        ['lyricsOutput', 'music_lyrics'],
        ['styleInput', 'music_style'],
        ['melodyOutput', 'music_melody'],
        ['chordsOutput', 'music_chords'],
      ];
      autoSave.forEach(([id, key]) => {
        document.getElementById(id).addEventListener('input', () => {
          localStorage.setItem(key, document.getElementById(id).value);
          if (contentFields.has(id)) autoSaveDebounced();
        });
      });

      // Save audience khi đổi
      document.getElementById('audience').addEventListener('change', () =>
        localStorage.setItem('music_audience', document.getElementById('audience').value));

      // Wire search (debounced 300ms để không render liên tục mỗi ký tự)
      const searchDebounced = debounce(loadHistory, 300);
      document.getElementById('searchHistory').addEventListener('input', searchDebounced);

      loadHistory();
    })();

    // ============================================================
    // GỌI GROQ QUA BACKEND /api/groq
    // ============================================================
    async function callGroq(messages, loadingId, btnId) {
      const loading = document.getElementById(loadingId);
      const btn = btnId ? document.getElementById(btnId) : null;

      loading.classList.add('active');
      if (btn) btn.disabled = true;

      try {
        console.log('[callGroq] Sending messages:', messages);

        const res = await fetch('/api/groq', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages }),
        });

        console.log('[callGroq] Response status:', res.status);

        if (!res.ok) {
          const text = await res.text().catch(() => '');
          console.error('[callGroq] API error:', text);
          throw new Error(`Lỗi HTTP ${res.status}: ${text.slice(0, 120)}`);
        }

        const data = await res.json();
        console.log('[callGroq] Response data:', data);

        return data.content || null;
      } catch (e) {
        console.error('[callGroq] Exception:', e);
        showToast('❌ Lỗi: ' + e.message);
        return null;
      } finally {
        loading.classList.remove('active');
        if (btn) btn.disabled = false;
      }
    }

    // ============================================================
    // 1. TẠO LỜI BÀI HÁT
    // ============================================================
    async function generateLyrics() {
      const idea = document.getElementById('ideaInput').value.trim();
      if (!idea) { showToast('⚠️ Vui lòng nhập ý tưởng trước!'); return; }

      const audience = document.getElementById('audience').value || 'general';
      const audienceMap = {
        general: 'Mọi người — ngôn từ dễ hiểu, tự nhiên, phù hợp nhiều độ tuổi, giai điệu dễ nghe dễ nhớ, tránh slang và từ quá cổ',
        kids: 'Thiếu nhi — ngôn từ đơn giản, vui tươi, dễ nhớ, có vần, chủ đề tích cực, lời nhạc ngắn, lặp lại, dễ hát theo',
        genz: 'Thanh thiếu niên (Gen Z) — hiện đại, tự nhiên, đôi khi đời thường, cảm xúc rõ ràng, văn phong nhạc trẻ trung',
        middle: 'Trung niên — chững chạc, sâu sắc, thực tế, giàu chiêm nghiệm, văn phong nhạc sâu lắng',
        elder:  'Người lớn tuổi — trữ tình, hoài niệm, văn phong nhạc xưa, thiết tha',
      };
      const audienceLine = `\nĐối tượng nghe: ${audienceMap[audience]}`;

      const result = await callGroq([{
        role: 'user',
        content: `Bạn là nhạc sĩ chuyên viết lời nhạc Việt. Hãy sáng tác lời bài hát tiếng Việt dựa trên ý tưởng sau:

Ý tưởng: ${idea}${audienceLine}

Yêu cầu:
- Trả về đúng định dạng bên dưới, không giải thích thêm
- Tựa bài hát ngắn gọn, hay, gợi cảm
- Cấu trúc lời: [Verse 1], [Chorus], [Verse 2], [Chorus], [Bridge] (nếu phù hợp), [Chorus]
- Lời thơ có vần điệu tự nhiên, giàu cảm xúc và hình ảnh
- Tiếng Việt chuẩn, trong sáng
- Viết PHÙ HỢP với đối tượng nghe đã nêu

Định dạng bắt buộc:

[Title]
Tên bài hát

[Lyrics]
(lời bài hát)`
      }], 'lyricsLoading', 'btnGenLyrics');

      if (!result) return; // lỗi đã được xử lý trong callGroq()

      const { title, lyrics } = parseTitleAndLyrics(result);
      if (!lyrics) {
        showToast('⚠️ Không nhận được nội dung từ AI, thử lại!');
        return;
      }
      if (title) {
        document.getElementById('songTitle').value = title;
        localStorage.setItem('music_title', title);
      }
      document.getElementById('lyricsOutput').value = lyrics;
      localStorage.setItem('music_lyrics', lyrics);
      autoSaveDebounced();
      showToast('✅ Đã tạo lời bài hát!');
    }

    // Tách title và lyrics từ response AI — hỗ trợ nhiều format khác nhau
    function parseTitleAndLyrics(raw) {
      const text = raw.trim();

      // --- Format 1: [Title] ... [Lyrics] ---
      const bracketTitle = text.match(/\[Title\]\s*\n([\s\S]*?)(?=\n\[Lyrics\])/i);
      const bracketLyrics = text.match(/\[Lyrics\]\s*\n([\s\S]*)/i);
      if (bracketTitle && bracketLyrics) {
        return { title: bracketTitle[1].trim(), lyrics: bracketLyrics[1].trim() };
      }

      // --- Format 2: Title: xxx \n Lyrics: ... ---
      const colonTitle = text.match(/^Title:\s*(.+)/im);
      const colonLyrics = text.match(/Lyrics:\s*\n([\s\S]*)/i);
      if (colonTitle) {
        const title = colonTitle[1].trim();
        const lyrics = colonLyrics
          ? colonLyrics[1].trim()
          : text.replace(/^Title:.+\n?/im, '').trim();
        return { title, lyrics };
      }

      // --- Format 3: chỉ có [Lyrics], không có [Title] ---
      if (bracketLyrics) {
        return { title: '', lyrics: bracketLyrics[1].trim() };
      }

      // --- Fallback: dòng đầu < 60 ký tự và không phải tag → làm title ---
      const lines = text.split('\n').map(l => l.trim()).filter(Boolean);
      if (lines.length > 1 && lines[0].length < 60 && !lines[0].startsWith('[')) {
        return { title: lines[0], lyrics: lines.slice(1).join('\n').trim() };
      }

      // Không tách được — trả toàn bộ làm lyrics, title trống
      return { title: '', lyrics: text };
    }

    // ============================================================
    // 2. VIẾT LẠI LỜI
    // ============================================================
    async function rewriteLyrics() {
      const current = document.getElementById('lyricsOutput').value.trim();
      const idea = document.getElementById('ideaInput').value.trim();

      if (!current && !idea) {
        showToast('⚠️ Vui lòng tạo lời hoặc nhập ý tưởng trước!');
        return;
      }

      const result = await callGroq([{
        role: 'user',
        content: `Bạn là nhạc sĩ chuyên viết lời nhạc Việt. Hãy viết lại lời bài hát bên dưới theo hướng sáng tạo hơn, dùng từ ngữ và hình ảnh khác nhưng giữ nguyên cảm xúc và chủ đề:

${current || `Chủ đề: ${idea}`}

Yêu cầu:
- Giữ cấu trúc [Verse], [Chorus]
- Lời mới khác biệt, không lặp từ cũ
- Tiếng Việt chuẩn, có vần điệu
- Chỉ xuất lời bài hát, không giải thích

Viết lại:`
      }], 'lyricsLoading', 'btnRewrite');

      if (result) {
        document.getElementById('lyricsOutput').value = result;
        localStorage.setItem('music_lyrics', result);
        autoSaveDebounced();
        showToast('✅ Đã viết lại lời bài hát!');
      }
    }

    // ============================================================
    // 3. COPY LỜI RIÊNG
    // ============================================================
    function copyLyrics() {
      const lyrics = document.getElementById('lyricsOutput').value.trim();
      if (!lyrics) { showToast('⚠️ Chưa có lời bài hát để copy!'); return; }
      navigator.clipboard.writeText(lyrics)
        .then(() => showToast('📋 Đã copy lời bài hát!'))
        .catch(() => showToast('❌ Không copy được, thử lại sau.'));
    }

    // ============================================================
    // 4. GỢI Ý GIAI ĐIỆU
    // ============================================================
    async function generateMelody() {
      const style = document.getElementById('styleInput').value.trim();
      if (!style) { showToast('⚠️ Vui lòng nhập phong cách nhạc!'); return; }

      const result = await callGroq([{
        role: 'user',
        content: `Bạn là nhà sản xuất âm nhạc chuyên nghiệp. Dựa trên phong cách "${style}", đề xuất thông tin giai điệu chi tiết cho bài hát tiếng Việt.

Trả lời đúng định dạng sau (tiếng Việt, ngắn gọn):

🎵 Tempo: [số BPM + mô tả ngắn]
🎭 Thể loại: [thể loại + phong cách cụ thể]
🎸 Nhạc cụ: [liệt kê 4–6 nhạc cụ chính]
🌟 Cảm xúc: [mood, không khí bài hát]
🎼 Ghi chú: [mô tả thêm về âm thanh, sản xuất]`
      }], 'melodyLoading', 'btnGenMelody');

      if (result) {
        document.getElementById('melodyOutput').value = result;
        localStorage.setItem('music_melody', result);
        showToast('✅ Đã gợi ý giai điệu!');
      }
    }

    // ============================================================
    // 5. BẬT/TẮT HỢP ÂM
    // ============================================================
    function toggleChords() {
      const on = document.getElementById('chordsToggle').checked;
      document.getElementById('chordsContent').style.display = on ? 'block' : 'none';
      localStorage.setItem('chords_on', on ? '1' : '0');
    }

    // ============================================================
    // 6. GỢI Ý HỢP ÂM
    // ============================================================
    async function generateChords() {
      const lyrics = document.getElementById('lyricsOutput').value.trim();
      const style = document.getElementById('styleInput').value.trim();
      const melody = document.getElementById('melodyOutput').value.trim();

      const ctx = [
        style && `Phong cách: ${style}`,
        melody && `Giai điệu:\n${melody}`,
        lyrics && `Lời bài hát (trích):\n${lyrics.slice(0, 600)}`,
      ].filter(Boolean).join('\n\n');

      const result = await callGroq([{
        role: 'user',
        content: `Bạn là nhạc sĩ chuyên về hoà âm nhạc Việt. Gợi ý hợp âm cho bài hát với thông tin:

${ctx || 'Bài hát nhạc Việt thông thường'}

Trả lời đúng định dạng (chỉ hợp âm, không giải thích):

[Intro]
...

[Verse]
...

[Chorus]
...

[Bridge]
...

[Outro]
...`
      }], 'chordsLoading', 'btnGenChords');

      if (result) {
        document.getElementById('chordsOutput').value = result;
        localStorage.setItem('music_chords', result);
        showToast('✅ Đã gợi ý hợp âm!');
      }
    }

    // ============================================================
    // 7. VIẾT TIẾP LỜI BÀI HÁT
    // ============================================================
    async function continueLyrics() {
      const current = document.getElementById('lyricsOutput').value.trim();
      if (!current) {
        showToast('⚠️ Chưa có lời bài hát để viết tiếp!');
        return;
      }

      // Lấy ~250 ký tự cuối làm ngữ cảnh để AI nối tự nhiên
      const tail = current.slice(-250);

      const result = await callGroq([{
        role: 'user',
        content: `Tiếp tục lời bài hát sau:

${tail}

Yêu cầu:
- Giữ nguyên phong cách, cảm xúc, cách gieo vần
- Giữ cấu trúc đoạn (Verse, Chorus, Bridge…)
- KHÔNG lặp lại nội dung cũ
- Viết thêm 1–2 đoạn tiếp theo
- Tiếng Việt tự nhiên, giàu cảm xúc

Chỉ xuất phần viết tiếp, không giải thích`
      }], 'lyricsLoading', 'btnContinue');

      if (result) {
        const updated = current + '\n\n' + result.trim();
        document.getElementById('lyricsOutput').value = updated;
        localStorage.setItem('music_lyrics', updated);
        autoSaveDebounced();
        showToast('✅ Đã viết thêm đoạn mới!');
      }
    }

    // ============================================================
    // COPY TIỆN ÍCH (melody + chords)
    // ============================================================
    function copyWithFallback(text, label) {
      if (!text) { showToast(`⚠️ Chưa có ${label} để copy!`); return; }
      navigator.clipboard.writeText(text)
        .then(() => showToast(`📋 Đã copy ${label}!`))
        .catch(() => prompt(`Copy ${label}:`, text));
    }

    function copyMelody() {
      copyWithFallback(document.getElementById('melodyOutput').value.trim(), 'giai điệu');
    }

    function copyChords() {
      copyWithFallback(document.getElementById('chordsOutput').value.trim(), 'hợp âm');
    }

    // ============================================================
    // LỊCH SỬ BÀI HÁT
    // ============================================================
    function getHistory() {
      try { return JSON.parse(localStorage.getItem('music_history') || '[]'); }
      catch { return []; }
    }

    function saveHistory(list) {
      localStorage.setItem('music_history', JSON.stringify(list));
    }

    function saveSong(silent = false) {
      const lyrics = document.getElementById('lyricsOutput').value.trim();
      if (!lyrics) {
        if (!silent) showToast('⚠️ Chưa có lời bài hát để lưu!');
        return;
      }

      const title = document.getElementById('songTitle').value.trim() || 'Bài hát chưa đặt tên';
      const idea = document.getElementById('ideaInput').value.trim();
      const melody = document.getElementById('melodyOutput').value.trim();
      const chords = document.getElementById('chordsOutput').value.trim();
      const audience = document.getElementById('audience').value;
      const now = new Date().toLocaleString('vi-VN');

      const history = getHistory();

      if (currentSongId) {
        const idx = history.findIndex(h => h.id === currentSongId);
        if (idx !== -1) {
          const existing = history[idx];
          history[idx] = {
            ...existing,
            title, idea, lyrics, melody, chords, audience,
            updatedAt: now,
          };
        } else {
          const newId = Date.now();
          history.unshift({ id: newId, title, idea, lyrics, melody, chords, audience, createdAt: now, updatedAt: now });
          currentSongId = newId;
        }
      } else {
        const newId = Date.now();
        history.unshift({ id: newId, title, idea, lyrics, melody, chords, audience, createdAt: now, updatedAt: now });
        currentSongId = newId;
      }

      saveHistory(history.slice(0, 50));
      loadHistory();
      if (!silent) showToast('✅ Đã lưu bài hát!');
    }

    function loadHistory() {
      const all = getHistory();
      const keyword = (document.getElementById('searchHistory')?.value || '').toLowerCase().trim();
      const container = document.getElementById('historyList');
      if (!container) return;

      const list = keyword
        ? all.filter(s =>
          (s.title || '').toLowerCase().includes(keyword) ||
          (s.lyrics || '').toLowerCase().includes(keyword) ||
          (s.idea || '').toLowerCase().includes(keyword))
        : all;

      if (!all.length) {
        container.innerHTML = '<div class="empty-state">Chưa có bài hát nào được lưu</div>';
        return;
      }
      if (!list.length) {
        container.innerHTML = '<div class="empty-state">Không tìm thấy bài hát nào</div>';
        return;
      }

      container.innerHTML = list.map((song, i) => {
        const isActive = song.id === currentSongId;
        // Preview: lấy dòng đầu tiên có nội dung
        const firstLine = (song.lyrics || '').split('\n').find(l => l.trim()) || '';
        const preview = escHtml(firstLine.slice(0, 80) + (firstLine.length > 80 ? '…' : ''));
        const dateStr = escHtml(song.updatedAt || song.createdAt || '');
        // Tìm index thực trong `all` để đảm bảo delete/load đúng khi đang filter
        const realIndex = all.indexOf(song);

        return `
          <div class="history-item${isActive ? ' active' : ''}">
            <div class="history-item-info">
              <div class="history-item-title">
                ${escHtml(song.title)}
                ${isActive ? '<span class="badge-editing">👉 Đang chỉnh</span>' : ''}
              </div>
              ${preview ? `<p class="preview">${preview}</p>` : ''}
              <div class="history-item-date">${dateStr}</div>
            </div>
            <div class="history-item-btns">
              <button class="btn-history btn-history-load" onclick="loadSong(${realIndex})">📂 Tải lại</button>
              <button class="btn-history btn-history-del"  onclick="deleteSong(${realIndex})">❌ Xoá</button>
            </div>
          </div>`;
      }).join('');
    }

    function loadSong(index) {
      const song = getHistory()[index];
      if (!song) return;

      const fields = [
        ['songTitle', 'music_title', song.title || ''],
        ['ideaInput', 'music_idea', song.idea || ''],
        ['lyricsOutput', 'music_lyrics', song.lyrics || ''],
        ['melodyOutput', 'music_melody', song.melody || ''],
        ['chordsOutput', 'music_chords', song.chords || ''],
      ];
      fields.forEach(([id, key, val]) => {
        document.getElementById(id).value = val;
        localStorage.setItem(key, val);
      });
      if (song.audience) {
        document.getElementById('audience').value = song.audience;
        localStorage.setItem('music_audience', song.audience);
      }

      currentSongId = song.id;
      loadHistory();
      showToast(`📂 Đã tải: ${song.title}`);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function deleteSong(index) {
      const list = getHistory();
      const song = list[index];
      const name = song?.title || 'bài hát này';
      if (!confirm(`Xoá "${name}"?`)) return;
      if (song && song.id === currentSongId) currentSongId = null;
      list.splice(index, 1);
      saveHistory(list);
      loadHistory();
      showToast('🗑️ Đã xoá!');
    }

    function clearAll() {
      if (!confirm('Xoá tất cả nội dung hiện tại? (Lịch sử đã lưu vẫn giữ nguyên)')) return;
      ['ideaInput', 'songTitle', 'lyricsOutput', 'melodyOutput', 'chordsOutput'].forEach(id => {
        document.getElementById(id).value = '';
      });
      ['music_idea', 'music_title', 'music_lyrics', 'music_melody', 'music_chords'].forEach(key => {
        localStorage.removeItem(key);
      });
      currentSongId = null;
      loadHistory();
      showToast('🧹 Đã xoá tất cả!');
    }

    // Escape HTML để tránh XSS khi render tên bài từ localStorage
    function escHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // ============================================================
    // EXPORT / IMPORT JSON
    // ============================================================
    function exportJSON() {
      const data = {
        title: document.getElementById('songTitle').value.trim(),
        idea: document.getElementById('ideaInput').value.trim(),
        lyrics: document.getElementById('lyricsOutput').value.trim(),
        melody: document.getElementById('melodyOutput').value.trim(),
        chords: document.getElementById('chordsOutput').value.trim(),
        audience: document.getElementById('audience').value,
        exportedAt: new Date().toLocaleString('vi-VN'),
      };

      if (!data.lyrics) { showToast('⚠️ Chưa có lời bài hát để xuất!'); return; }

      const safeName = (data.title || 'bai-hat').replace(/[^\w\dÀ-ỹà-ỹ]/g, '_').replace(/_+/g, '_').replace(/^_|_$/g, '');
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = Object.assign(document.createElement('a'), { href: url, download: `${safeName}-export.json` });
      a.click();
      URL.revokeObjectURL(url);
      showToast('⬇️ Đã xuất file JSON!');
    }

    function importJSON(event) {
      const file = event.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function (e) {
        try {
          const data = JSON.parse(e.target.result);
          if (!data.title || !data.lyrics) throw new Error('Invalid file');
          const fields = [
            ['songTitle', 'music_title', data.title],
            ['ideaInput', 'music_idea', data.idea],
            ['lyricsOutput', 'music_lyrics', data.lyrics],
            ['melodyOutput', 'music_melody', data.melody],
            ['chordsOutput', 'music_chords', data.chords],
          ];
          fields.forEach(([id, key, val]) => {
            if (val !== undefined && val !== null) {
              document.getElementById(id).value = val;
              localStorage.setItem(key, val);
            }
          });
          if (data.audience) {
            document.getElementById('audience').value = data.audience;
            localStorage.setItem('music_audience', data.audience);
          }
          currentSongId = null;
          loadHistory();
          autoSaveDebounced();
          showToast('⬆️ Đã nhập bài hát từ file!');
        } catch {
          showToast('❌ File JSON không hợp lệ!');
        }
        event.target.value = '';
      };
      reader.readAsText(file);
    }

    // ============================================================
    // TOAST THÔNG BÁO
    // ============================================================
    let toastTimer = null;
    function showToast(msg, ms = 3000) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => el.classList.remove('show'), ms);
    }
  </script>
</body>
